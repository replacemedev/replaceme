name: Security & quality

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit-and-rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Dependency audit (high+)
        run: npm run audit
      - name: RLS coverage check
        run: npm run check:rls
      - name: Lint
        run: npm run lint
