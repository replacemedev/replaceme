  - heading "Frequently Asked Questions" [level=2]
  - paragraph: Everything you need to know about how Replace Me works.
  - button "What is Replace Me? add":
    - heading "What is Replace Me?" [level=3]
    - text: add
  - paragraph: Replace Me is a direct hiring platform that connects businesses with Filipino virtual assistants and remote workers. Employers can hire and manage talent directly, with no agency fees, salary markups, or ongoing commissions.
  - button "Can I unsubscribe after hiring? add":
    - heading "Can I unsubscribe after hiring?" [level=3]
    - text: add
  - paragraph: Yes, you can unsubscribe at anytime! There are no contracts, so once you’ve hired someone, you can cancel your subscription and restart it later if you need to find another worker.
  - button "Do I pay monthly fees for my worker? add":
    - heading "Do I pay monthly fees for my worker?" [level=3]
    - text: add
  - paragraph: Nope! Since we’re not an agency, you hire and pay your remote worker directly (with no on-going fees!). Even if you unsubscribe, you still have complete control and management over your hire.
  - button "What is the refund policy? add":
    - heading "What is the refund policy?" [level=3]
    - text: add
  - paragraph: We have a 30-day money back guarantee! So if for any reason you are not 100% satisfied or don’t find the perfect match within 30 days, we will give you a full refund.
  - button "What can I do with a FREE account? add":
    - heading "What can I do with a FREE account?" [level=3]
    - text: add
  - paragraph: You can post job listings and review applications to get an idea of potential candidates. However, you won’t be able to message and hire them until you subscribe to a paid account.
